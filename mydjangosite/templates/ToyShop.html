{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToyShop</title>
    <style>
      *{
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
      .main{
        display: flex;
        flex-wrap: wrap;
        /* justify-content: center; */
        /* align-items: center; */
        
      }
      .Product{
        /* justify-content: center; */
        border: 2px solid black;
        width: 42px;
        padding-left: 15px;
        padding-top: 20px;
        border-radius: 35px;
        background-color: rgb(255, 255, 255);
      }
      .Product:hover{
        box-shadow: 10px 10px 10px grey;
      }
      img{
        width: 40vh;
        border-radius: 35px;
      }
      .btn {
        width: 100px;
        height: 25px;
        background-color: blue;
        color: white;
        border-radius: 20px black;
        


      }
    </style>
  </head>
  <body>
    <!-- Content Start -->
    <div class="main">
      <!-- Product Start -->
      <div class="Product">
        <img src="{% static 'img1.jpg' %}" />
        <h3> GALAXY A35 5G</h3>
        <p>₹9999</p>
        <input type="button" class="btn" value="Buy Now"/>
      </div>

      <!-- Product End -->
    </div>

    <!-- Content Start -->
  </body>
</html>
