<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Table</title>

</head>
<body>
    {% include 'menu.html' %}
    <table border="1">
        <tr>
            <th>ID</th>
            <th>CategoryName</th>
        </tr>
        {% for c in category %}
        <tr>
            <td>{{c.id}} </td>
            <td>{{c.title}} </td>
            <td>
                <a href="/editcategory/{{c.id}}/">Edit</a>
                <a href="/deletecategory/{{c.id}}/"
                onclick=""return confirm('Are You Sure?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
