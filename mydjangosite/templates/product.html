<!-- {% load static %} -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToyShop</title>
    <style>
      * {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        

      }

      .main {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        font-size: 15px;
        /* justify-content: center; */
        /* align-items: center; */
      }
      .Product {
        /* justify-content: center; */
        border: 2px solid black;
        width: 215px;
        height: 355px;
        padding-left: 15px;
        padding-top: 15px;
        border-radius: 35px;
        background-color: rgb(255, 255, 255);
      
      }
      .Product:hover {
        box-shadow: 10px 10px 10px grey;
      }
      /* img {
        width: 250px;
        border-radius: 20px;
      } */
      .btn {
        /* margin: 5px; */
        width: 95px;
        /* height: 25px; */
        background-color: blue;
        color: white;
        border-radius: 10px;
        margin-left: 50px;
      }
      .btn:hover {
           background-color: white;  
           color: black;
      }
      .title{ 
        margin: 5px;
      }
      .price{
        margin: 7px;
      }
    </style>
  </head>
  <body>
     {% include 'menu.html' %}
     <h1>My Products</h1>

    <!-- Content Start -->
    <div class="main">
       {% for i in mydata %}
      <!-- Product Start -->
      <div class="Product">
        
      <img src="/images/{{ i.image }}" width="200px" height="255px"/>
      <h3 class="title"> {{ i.title }}</h3>
        <p class="price">₹{{ i.price }}</p>
        <input type="button" class="btn" value="Buy Now" />
      </div>
          {% endfor %}
      <!-- Product End -->
    </div>

    <!-- Content End -->
  </body>
</html>
